name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: TypeScript, Tests, Build, Harness
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.14.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI gate
        run: pnpm run ci

  docker:
    name: Docker Build And Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - quality
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate Compose
        run: |
          docker compose --env-file .env.dev.example -f docker-compose.yml -f docker-compose.dev.yml config --quiet
          docker compose --env-file .env.prod.example -f docker-compose.yml -f docker-compose.prod.yml config --quiet

      - name: Prepare production-like smoke env
        run: |
          cp .env.prod.example .env.ci.prod
          sed -i 's|^BVS_AUTH_SECRET=.*|BVS_AUTH_SECRET=ci-wiiicare-auth-secret-0123456789abcdef|g' .env.ci.prod
          sed -i 's|^BVS_RECORD_TRANSFER_CALLBACK_SECRET=.*|BVS_RECORD_TRANSFER_CALLBACK_SECRET=ci-wiiicare-callback-secret-0123456789abcdef|g' .env.ci.prod
          sed -i 's|^BVS_RECORD_TRANSFER_CALLBACK_SECRETS_JSON=.*|BVS_RECORD_TRANSFER_CALLBACK_SECRETS_JSON={"gateway-hai-phong-referral":"ci-wiiicare-callback-secret-0123456789abcdef"}|g' .env.ci.prod
          sed -i 's|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=ci_bvs_postgres_password|g' .env.ci.prod
          sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql://bvs:ci_bvs_postgres_password@postgres:5432/benh_vien_so|g' .env.ci.prod
          sed -i 's|^MINIO_ROOT_PASSWORD=.*|MINIO_ROOT_PASSWORD=ci_bvs_minio_password|g' .env.ci.prod

      - name: Build production images
        run: docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml build migrate api web

      - name: Boot production-like smoke stack
        run: docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml up -d --wait postgres valkey minio migrate api web

      - name: Verify API health
        run: curl -fsS http://localhost:7310/health

      - name: Verify API readiness dependencies
        run: |
          curl -fsS http://localhost:7310/ready -o /tmp/api-ready.json
          node <<'NODE'
          const fs = require("node:fs");
          const ready = JSON.parse(fs.readFileSync("/tmp/api-ready.json", "utf8"));
          if (ready.status !== "ready") {
            throw new Error("Expected ready status, received " + ready.status);
          }
          if (ready.repository !== "postgres") {
            throw new Error("Expected postgres repository, received " + ready.repository);
          }
          if (ready.checks?.patients?.status !== "ok") {
            throw new Error("Expected patients repository readiness check to be ok.");
          }
          if (ready.checks?.providerDirectory?.status !== "ok") {
            throw new Error("Expected provider directory readiness check to be ok.");
          }
          if (ready.checks?.loginRateLimit?.status !== "ok") {
            throw new Error("Expected login rate limit readiness check to be ok.");
          }
          if (ready.checks?.loginRateLimit?.store !== "valkey") {
            throw new Error("Expected Valkey login rate limit store.");
          }
          NODE

      - name: Verify web health
        run: curl -fsS http://localhost:8080/health

      - name: Verify web security headers
        run: |
          curl -fsSI http://localhost:8080/ | grep -i '^Content-Security-Policy:'
          curl -fsSI http://localhost:8080/ | grep -i '^X-Frame-Options: DENY'
          curl -fsSI http://localhost:8080/ | grep -i '^X-Content-Type-Options: nosniff'

      - name: Verify FHIR metadata public URL
        run: |
          curl -fsS http://localhost:8080/api/v1/fhir/metadata -o /tmp/fhir-metadata.json
          node <<'NODE'
          const fs = require("node:fs");
          const metadata = JSON.parse(fs.readFileSync("/tmp/fhir-metadata.json", "utf8"));
          if (metadata.resourceType !== "CapabilityStatement") {
            throw new Error("Expected CapabilityStatement");
          }
          if (metadata.implementation?.url !== "https://api.wiiicare.example.vn/api/v1") {
            throw new Error("Unexpected implementation.url: " + metadata.implementation?.url);
          }
          NODE

      - name: Verify patient API requires authentication
        run: |
          status=$(curl -sS -o /tmp/patient-api.json -w "%{http_code}" http://localhost:8080/api/v1/patients)
          test "$status" = "401"
          grep -q "UNAUTHENTICATED" /tmp/patient-api.json

      - name: Verify demo login is disabled in production-like smoke
        run: |
          status=$(curl -sS -o /tmp/demo-login.json -w "%{http_code}" \
            -X POST http://localhost:8080/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"practitioner-demo-001","password":"demo","role":"clinician"}')
          test "$status" = "403"
          grep -q "DEMO_AUTH_DISABLED" /tmp/demo-login.json

      - name: Enable controlled demo auth for authenticated PostgreSQL smoke
        run: |
          cp .env.ci.prod .env.ci.prod.auth-smoke
          sed -i 's|^BVS_DEMO_AUTH_ENABLED=.*|BVS_DEMO_AUTH_ENABLED=true|g' .env.ci.prod.auth-smoke
          docker compose --env-file .env.ci.prod.auth-smoke -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps --force-recreate api
          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:7310/ready >/tmp/api-ready-auth-smoke.json; then
              exit 0
            fi
            sleep 2
          done
          docker compose --env-file .env.ci.prod.auth-smoke -f docker-compose.yml -f docker-compose.prod.yml logs --tail=100 api
          exit 1

      - name: Verify authenticated PostgreSQL API smoke
        env:
          WIIICARE_SMOKE_BASE_URL: http://localhost:8080/api/v1
          BVS_RECORD_TRANSFER_CALLBACK_SECRETS_JSON: '{"gateway-hai-phong-referral":"ci-wiiicare-callback-secret-0123456789abcdef"}'
          BVS_RECORD_TRANSFER_CALLBACK_KEY_ID: gateway-hai-phong-referral
        run: node scripts/harness/authenticated-api-smoke.mjs

      - name: Verify database migration
        run: |
          docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres psql -U bvs -d benh_vien_so -c "select version, left(checksum_sha256, 12) as checksum_prefix from schema_migrations order by version;"
          expected_migrations=$(find migrations -maxdepth 1 -name '*.sql' | wc -l | tr -d ' ')
          actual_migrations=$(docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres psql -U bvs -d benh_vien_so -Atc "select count(*) from schema_migrations;")
          test "$actual_migrations" = "$expected_migrations"
          missing_checksums=$(docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres psql -U bvs -d benh_vien_so -Atc "select count(*) from schema_migrations where checksum_sha256 is null or checksum_sha256 = '';")
          test "$missing_checksums" = "0"
          docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres psql -U bvs -d benh_vien_so -Atc "
          with expected(table_name) as (
            values
              ('patients'),
              ('patient_identifier_index'),
              ('encounters'),
              ('allergy_intolerances'),
              ('conditions'),
              ('service_requests'),
              ('workflow_tasks'),
              ('procedures'),
              ('observations'),
              ('diagnostic_reports'),
              ('imaging_studies'),
              ('medication_requests'),
              ('medication_dispenses'),
              ('medication_administrations'),
              ('clinical_documents'),
              ('consents'),
              ('record_transfers'),
              ('record_transfer_delivery_attempts'),
              ('provider_directory_resources'),
              ('audit_events'),
              ('schema_migrations')
          )
          select table_name
          from expected
          except
          select table_name
          from information_schema.tables
          where table_schema = 'public';
          " | tee /tmp/missing-wiiicare-tables.txt
          test ! -s /tmp/missing-wiiicare-tables.txt
          record_transfer_constraints=$(docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres psql -U bvs -d benh_vien_so -Atc "
          select count(*)
          from pg_constraint
          where conrelid = 'record_transfers'::regclass
            and conname in (
              'record_transfers_dead_letter_after_failed',
              'record_transfers_acknowledgement_after_received'
            );
          ")
          test "$record_transfer_constraints" = "2"
          dead_letter_constraint=$(docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres psql -U bvs -d benh_vien_so -Atc "
          select count(*)
          from pg_constraint
          where conrelid = 'record_transfers'::regclass
            and conname = 'record_transfers_dead_letter_after_failed'
            and pg_get_constraintdef(oid) like '%dead_lettered_at IS NOT NULL%'
            and pg_get_constraintdef(oid) like '%failed_at IS NOT NULL%';
          ")
          test "$dead_letter_constraint" = "1"
          acknowledgement_constraint=$(docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres psql -U bvs -d benh_vien_so -Atc "
          select count(*)
          from pg_constraint
          where conrelid = 'record_transfers'::regclass
            and conname = 'record_transfers_acknowledgement_after_received'
            and pg_get_constraintdef(oid) like '%received_at IS NOT NULL%';
          ")
          test "$acknowledgement_constraint" = "1"
          patient_identifier_constraint=$(docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres psql -U bvs -d benh_vien_so -Atc "
          select count(*)
          from pg_constraint
          where conrelid = 'patient_identifier_index'::regclass
            and conname = 'patient_identifier_index_unique_identifier';
          ")
          test "$patient_identifier_constraint" = "1"
          patient_merge_constraint=$(docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres psql -U bvs -d benh_vien_so -Atc "
          select count(*)
          from pg_constraint
          where conrelid = 'patients'::regclass
            and conname = 'patients_merge_metadata_required'
            and pg_get_constraintdef(oid) like '%merged_into_patient_id IS NOT NULL%'
            and pg_get_constraintdef(oid) like '%merged_at IS NOT NULL%';
          ")
          test "$patient_merge_constraint" = "1"

      - name: Print diagnostics on failure
        if: failure()
        run: |
          docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml ps
          docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml logs --tail=200

      - name: Tear down stack
        if: always()
        run: docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml down -v --remove-orphans
