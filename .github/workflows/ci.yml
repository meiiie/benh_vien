name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: TypeScript, Tests, Build, Harness
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.14.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI gate
        run: pnpm run ci

  docker:
    name: Docker Build And Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - quality
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate Compose
        run: |
          docker compose --env-file .env.dev.example -f docker-compose.yml -f docker-compose.dev.yml config --quiet
          docker compose --env-file .env.prod.example -f docker-compose.yml -f docker-compose.prod.yml config --quiet

      - name: Prepare production-like smoke env
        run: |
          cp .env.prod.example .env.ci.prod
          sed -i 's|^BVS_AUTH_SECRET=.*|BVS_AUTH_SECRET=ci-wiiicare-auth-secret-0123456789abcdef|g' .env.ci.prod
          sed -i 's|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=ci_bvs_postgres_password|g' .env.ci.prod
          sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql://bvs:ci_bvs_postgres_password@postgres:5432/benh_vien_so|g' .env.ci.prod
          sed -i 's|^MINIO_ROOT_PASSWORD=.*|MINIO_ROOT_PASSWORD=ci_bvs_minio_password|g' .env.ci.prod

      - name: Build production images
        run: docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml build migrate api web

      - name: Boot production-like smoke stack
        run: docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml up -d --wait postgres valkey minio migrate api web

      - name: Verify API health
        run: curl -fsS http://localhost:7310/health

      - name: Verify web health
        run: curl -fsS http://localhost:8080/health

      - name: Verify web security headers
        run: |
          curl -fsSI http://localhost:8080/ | grep -i '^Content-Security-Policy:'
          curl -fsSI http://localhost:8080/ | grep -i '^X-Frame-Options: DENY'
          curl -fsSI http://localhost:8080/ | grep -i '^X-Content-Type-Options: nosniff'

      - name: Verify patient API requires authentication
        run: |
          status=$(curl -sS -o /tmp/patient-api.json -w "%{http_code}" http://localhost:8080/api/v1/patients)
          test "$status" = "401"
          grep -q "UNAUTHENTICATED" /tmp/patient-api.json

      - name: Verify demo login is disabled in production-like smoke
        run: |
          status=$(curl -sS -o /tmp/demo-login.json -w "%{http_code}" \
            -X POST http://localhost:8080/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"practitioner-demo-001","password":"demo","role":"clinician"}')
          test "$status" = "403"
          grep -q "DEMO_AUTH_DISABLED" /tmp/demo-login.json

      - name: Verify database migration
        run: docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres psql -U bvs -d benh_vien_so -c "select version from schema_migrations order by version;"

      - name: Print diagnostics on failure
        if: failure()
        run: |
          docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml ps
          docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml logs --tail=200

      - name: Tear down stack
        if: always()
        run: docker compose --env-file .env.ci.prod -f docker-compose.yml -f docker-compose.prod.yml down -v --remove-orphans
