name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: TypeScript, Tests, Build, Harness
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI gate
        run: pnpm run ci

  docker:
    name: Docker Build And Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate Compose
        run: |
          docker compose --env-file .env.dev.example -f docker-compose.yml -f docker-compose.dev.yml config --quiet
          docker compose --env-file .env.prod.example -f docker-compose.yml -f docker-compose.prod.yml config --quiet

      - name: Build production images
        run: docker compose --env-file .env.prod.example -f docker-compose.yml -f docker-compose.prod.yml build migrate api web

      - name: Boot production-like smoke stack
        run: docker compose --env-file .env.prod.example -f docker-compose.yml -f docker-compose.prod.yml up -d --wait postgres valkey minio migrate api web

      - name: Verify API health
        run: curl -fsS http://localhost:7310/health

      - name: Verify web health
        run: curl -fsS http://localhost:8080/health

      - name: Verify patient API
        run: curl -fsS http://localhost:8080/api/v1/patients

      - name: Verify database migration
        run: docker compose --env-file .env.prod.example -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres psql -U bvs -d benh_vien_so -c "select version from schema_migrations order by version;"

      - name: Print diagnostics on failure
        if: failure()
        run: |
          docker compose --env-file .env.prod.example -f docker-compose.yml -f docker-compose.prod.yml ps
          docker compose --env-file .env.prod.example -f docker-compose.yml -f docker-compose.prod.yml logs --tail=200

      - name: Tear down stack
        if: always()
        run: docker compose --env-file .env.prod.example -f docker-compose.yml -f docker-compose.prod.yml down -v --remove-orphans
